        <div class="cards-row">
            <div class="discord-card">

                    <div class="avatar-status-wrapper">
                        <img id="card-avatar" src="" alt="">
                        <div id="status-dot"></div>
                    </div>
                    <div class="discord-text">
                        <div class="discord-name-badges">
                            <span id="discord-username">Loading...</span>

                        <p id="discord-details"></p>
                    </div>
                </div>
            </div>

                    nguoi con gai dang yeu ngo ngang.<br>
                </p>
            </div>

        <!-- Music Player phiên bản nâng cấp chuẩn chỉ tỉ lệ xịn -->
        <div class="music-player">
            <!-- Khối bên trái: Ảnh đĩa nhạc hình tròn (Đã thêm ID để JS tự thay đổi icon) -->
            <div class="player-left-disk">
                <img src="assets/flower.png" alt="Music Icon" class="player-icon" id="player-disk-img">
            </div>

            <!-- Khối bên phải: Chứa tên bài, thanh thời gian và cụm nút bấm -->
            <div class="player-right-controls">
                <!-- ĐÃ SỬA: Thêm id="song-title" để JavaScript nhận diện đổi chữ ngẫu nhiên -->
                <div class="song-title" id="song-title">Loading Song...</div>
                
                <div class="progress-row">
                    <span id="current-time">0:00</span>
                    <div class="progress-container" id="progress-container">
                        <div class="progress-bar" id="progress-bar"></div>
                    </div>
                    <span id="duration-time">0:00</span>
                </div>

                <div class="controls-and-volume-row">
                    <!-- 1. Cụm nút điều khiển nằm bên TRÁI -->
                    <div class="player-controls">
                        <button class="control-btn"><i class="fas fa-step-backward"></i></button>
                        <button class="control-btn play-pause-btn" id="player-play-btn"><i class="fas fa-pause"></i></button>
                        <button class="control-btn"><i class="fas fa-step-forward"></i></button>
                    </div>
                    
                    <!-- 2. Thanh âm lượng nằm bên PHẢI, kéo DÀI sang bên trái tiến sát nút Next -->
                    <div class="volume-container">
                        <i class="fas fa-volume-up volume-icon" id="player-volume-icon" style="cursor: pointer;"></i>
                        <div class="volume-slider-bg" id="volume-slider-bg">
                            <div class="volume-slider-bar" id="volume-slider-bar" style="width: 80%;"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
